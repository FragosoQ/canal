<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a3d3a">
<title>Festival dos Canais 2026 · Aveiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0c1f1d; --paper:#f3f1e9; --paper-2:#eae6d8;
    --teal-900:#072e2b; --teal-800:#0a3d3a; --teal-700:#0d4f4a;
    --water:#1fb6a6; --water-soft:#7fd6cb;
    --amber:#f2a900; --coral:#ff6b5e;
    --line:rgba(12,31,29,.12);
    --card:#ffffff;
    --shadow:0 1px 2px rgba(7,46,43,.06),0 8px 24px rgba(7,46,43,.07);
    /* category colors */
    --c-musica:#ff6b5e; --c-circo:#f2a900; --c-danca:#7b5cff;
    --c-teatro:#1fb6a6; --c-multi:#3a8dde; --c-oficina:#5fae3a; --c-inst:#d4569b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    padding-bottom:env(safe-area-inset-bottom);
  }
  a{color:inherit}

  /* ---------- Header ---------- */
  header{
    position:relative; overflow:hidden;
    background:linear-gradient(160deg,var(--teal-800) 0%,var(--teal-900) 70%);
    color:var(--paper); padding:26px 18px 16px;
    padding-top:calc(26px + env(safe-area-inset-top));
    display:flex; align-items:center; gap:18px; flex-wrap:wrap;
  }
  .head-text{flex:1 1 240px; min-width:0; position:relative; z-index:2}
  .head-art{
    flex:0 0 auto; width:clamp(108px,30.6vw,189px); height:auto;
    object-fit:contain; margin-left:auto; position:relative; z-index:2;
    filter:drop-shadow(0 6px 18px rgba(0,0,0,.25));
  }
  @media(max-width:560px){
    header{padding-bottom:18px}
    .head-art{width:min(54vw,198px); margin:6px auto 0; order:3}
  }
  header .wave{
    position:absolute; left:0; right:0; bottom:-1px; height:34px; display:block;
    color:var(--paper);
  }
  .eyebrow{
    font-size:11px; letter-spacing:.28em; text-transform:uppercase;
    color:var(--water-soft); font-weight:600; margin:0 0 6px;
  }
  h1{
    font-family:"Fraunces",Georgia,serif; font-weight:900;
    font-size:clamp(30px,8vw,46px); line-height:.96; margin:0;
    letter-spacing:-.01em;
  }
  h1 .em{color:var(--amber); font-style:italic}
  .sub{margin:10px 0 0; color:#cfe9e4; font-size:13.5px; max-width:34ch}

  /* ---------- Sticky controls ---------- */
  .controls{
    position:sticky; top:0; z-index:20;
    background:rgba(243,241,233,.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .days{
    display:flex; gap:6px; overflow-x:auto; padding:10px 14px;
    scrollbar-width:none;
  }
  .days::-webkit-scrollbar{display:none}
  .day{
    flex:0 0 auto; border:1px solid var(--line); background:var(--card);
    border-radius:14px; padding:7px 13px; cursor:pointer; text-align:center;
    min-width:58px; transition:.16s ease; line-height:1.15;
  }
  .day b{display:block; font-family:"Fraunces",serif; font-size:19px; font-weight:600}
  .day span{font-size:10px; text-transform:uppercase; letter-spacing:.08em; opacity:.6}
  .day.active{background:var(--teal-800); color:var(--paper); border-color:var(--teal-800)}
  .day.active span{opacity:.85}
  .day.today{box-shadow:inset 0 0 0 2px var(--amber)}

  .toolbar{display:flex; gap:8px; padding:0 14px 10px; align-items:center}
  .search{
    flex:1; display:flex; align-items:center; gap:8px;
    background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:8px 11px;
  }
  .search input{
    border:0; outline:0; background:transparent; width:100%;
    font:inherit; font-size:14px; color:var(--ink);
  }
  .search svg{flex:0 0 auto; opacity:.5}
  .favbtn{
    flex:0 0 auto; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:8px 11px; cursor:pointer; font:inherit;
    font-size:13px; font-weight:600; display:flex; gap:6px; align-items:center;
    color:var(--ink); transition:.16s;
  }
  .favbtn.on{background:var(--coral); color:#fff; border-color:var(--coral)}

  .chips{display:flex; gap:6px; overflow-x:auto; padding:0 14px 11px; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto; border:1px solid var(--line); background:var(--card);
    border-radius:999px; padding:5px 12px; font-size:12.5px; font-weight:600;
    cursor:pointer; white-space:nowrap; transition:.16s; color:var(--ink);
    display:flex; align-items:center; gap:6px;
  }
  .chip .dot{width:8px; height:8px; border-radius:50%}
  .chip.active{background:var(--ink); color:var(--paper); border-color:var(--ink)}

  /* ---------- List / timeline ---------- */
  main{padding:16px 14px 40px; max-width:680px; margin:0 auto}
  .daytitle{
    font-family:"Fraunces",serif; font-weight:600; font-size:15px;
    margin:4px 2px 14px; color:var(--teal-700); display:flex;
    align-items:baseline; gap:8px;
  }
  .daytitle .count{font-family:"Inter",sans-serif; font-size:12px; font-weight:600; color:#8a948f}

  .timeline{position:relative; padding-left:60px}
  .timeline::before{
    content:""; position:absolute; left:43px; top:6px; bottom:6px;
    width:2px; background:linear-gradient(var(--water-soft),var(--line));
  }
  .ev{position:relative; margin:0 0 14px; animation:rise .4s ease both}
  @keyframes rise{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}
  .ev .time{
    position:absolute; left:-60px; top:2px; width:44px; text-align:right;
    font-variant-numeric:tabular-nums; font-weight:700; font-size:13px; color:var(--teal-700);
  }
  .ev .time small{display:block; font-weight:500; font-size:10.5px; color:#9aa39e; margin-top:1px}
  .ev .node{
    position:absolute; left:-23px; top:5px; width:14px; height:14px; border-radius:50%;
    background:var(--card); border:3px solid var(--water); z-index:2;
  }
  .card{
    background:var(--card); border:1px solid var(--line); border-left-width:4px;
    border-radius:14px; padding:12px 14px; box-shadow:var(--shadow);
  }
  .card .top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start}
  .title{font-family:"Fraunces",serif; font-weight:600; font-size:16.5px; line-height:1.2; margin:0}
  .flag{font-size:11px; font-weight:700; color:#fff; background:var(--ink); border-radius:6px;
    padding:1px 6px; margin-left:6px; vertical-align:2px; letter-spacing:.04em}
  .group{font-size:13px; color:#5d6964; margin:3px 0 0}
  .meta{display:flex; flex-wrap:wrap; gap:10px 14px; margin-top:9px; align-items:center}
  .cat{font-size:11.5px; font-weight:700; letter-spacing:.02em}
  .venue{font-size:12.5px; color:#5d6964; display:inline-flex; align-items:center; gap:5px; text-decoration:none}
  .venue:hover{color:var(--teal-700); text-decoration:underline}
  .venue svg{opacity:.6}
  .star{
    margin-left:auto; cursor:pointer; border:0; background:transparent; padding:4px;
    color:var(--line); transition:.15s; line-height:0;
  }
  .star svg{width:21px; height:21px}
  .star.on{color:var(--coral)}
  .star.on svg{fill:var(--coral)}
  .badge-now{
    font-size:10.5px; font-weight:800; color:#fff; background:var(--coral);
    border-radius:6px; padding:2px 7px; letter-spacing:.05em;
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{50%{opacity:.55}}
  .ev.is-now .node{border-color:var(--coral); box-shadow:0 0 0 4px rgba(255,107,94,.2)}

  .empty{text-align:center; color:#8a948f; padding:50px 20px; font-size:14px}
  .empty b{display:block; font-family:"Fraunces",serif; font-size:18px; color:var(--teal-700); margin-bottom:6px}

  footer{
    text-align:center; font-size:11.5px; color:#8a948f; padding:24px 18px 30px;
    border-top:1px solid var(--line); margin-top:10px;
  }
  footer a{color:var(--teal-700); font-weight:600; text-decoration:none}
  footer .credit{
    margin-top:10px; font-family:"Fraunces",serif; font-size:13px;
    font-weight:600; color:var(--teal-700); letter-spacing:.01em;
  }

  /* ---------- Detail sheet ---------- */
  .card.tappable{cursor:pointer; transition:transform .12s ease, box-shadow .12s ease}
  .card.tappable:hover{transform:translateY(-1px); box-shadow:0 2px 4px rgba(7,46,43,.08),0 12px 28px rgba(7,46,43,.1)}
  .card.tappable:active{transform:translateY(0)}
  .has-desc .title::after{
    content:"›"; color:var(--water); font-weight:700; margin-left:6px;
    font-family:"Inter",sans-serif; opacity:.7;
  }
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(7,46,43,.5);
    backdrop-filter:blur(3px); z-index:40; animation:fade .2s ease;
  }
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:var(--paper); border-radius:22px 22px 0 0;
    max-width:680px; margin:0 auto; max-height:86vh; overflow-y:auto;
    padding:22px 20px calc(28px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 40px rgba(7,46,43,.25); animation:slideup .26s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet::before{
    content:""; position:absolute; top:9px; left:50%; transform:translateX(-50%);
    width:40px; height:4px; border-radius:2px; background:var(--line);
  }
  .sheet-close{
    position:absolute; top:14px; right:14px; width:32px; height:32px;
    border:0; border-radius:50%; background:var(--paper-2); color:var(--ink);
    font-size:22px; line-height:1; cursor:pointer;
  }
  .sheet .s-cat{font-size:11.5px; font-weight:700; letter-spacing:.02em; margin:6px 0 4px}
  .sheet h2{font-family:"Fraunces",serif; font-weight:600; font-size:23px; line-height:1.15; margin:0 0 2px}
  .sheet .s-group{font-size:14px; color:#5d6964; margin:0 0 14px}
  .sheet .s-row{display:flex; gap:10px; align-items:flex-start; font-size:14px; margin:8px 0; color:var(--ink)}
  .sheet .s-row svg{flex:0 0 auto; margin-top:2px; color:var(--teal-700)}
  .sheet .s-row a{color:var(--teal-700); font-weight:600; text-decoration:none}
  .sheet .s-desc{font-size:15px; line-height:1.6; color:#33433f; margin:14px 0 18px}
  .sheet .s-actions{display:flex; gap:10px; flex-wrap:wrap}
  .sheet .s-btn{
    flex:1 1 auto; text-align:center; border:1px solid var(--line); background:var(--card);
    border-radius:12px; padding:11px 14px; font:inherit; font-size:14px; font-weight:600;
    cursor:pointer; color:var(--ink); text-decoration:none; display:inline-flex;
    gap:7px; align-items:center; justify-content:center;
  }
  .sheet .s-btn.primary{background:var(--teal-800); color:var(--paper); border-color:var(--teal-800)}
  .sheet .s-btn.fav.on{background:var(--coral); color:#fff; border-color:var(--coral)}
</style>
</head>

</header>

<div class="controls">

      <input id="search" type="search" placeholder="Procurar espetáculo, artista, local…" autocomplete="off">
    </label>
    <button class="favbtn" id="favbtn" aria-pressed="false">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17.3 5.8 21l1.6-7L2 9.2l7.1-.6L12 2l2.9 6.6 7.1.6-5.4 4.8 1.6 7z"/></svg>
      Favoritos
    </button>
  </div>
  <div class="chips" id="chips"></div>
</div>

<main>
  <div class="daytitle" id="daytitle"></div>
  <div id="list"></div>
</main>

<footer>
  Dados do <a href="https://festivaldoscanais.pt/" target="_blank" rel="noopener">festivaldoscanais.pt</a> · App não oficial · Horários sujeitos a alteração

</footer>

<div class="sheet-backdrop" id="backdrop" hidden></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle" hidden>
  <button class="sheet-close" id="sheetClose" aria-label="Fechar">&times;</button>
  <div class="sheet-body" id="sheetBody"></div>
</div>

// Descrições (resumidas) por espetáculo — fonte: festivaldoscanais.pt

// ---- state ----
const LS_FAV="fdc2026_favs";
let favs = new Set(JSON.parse(localStorage.getItem(LS_FAV)||"[]"));
const evId = e => `${e.day}|${e.h}|${e.t}|${e.v}`;
let state = {day:15, cat:"all", q:"", favOnly:false};

// pick the festival day matching today, else first day
(function initDay(){
  const today = new Date();
  const m = today.getMonth()+1, dt = today.getDate(), y = today.getFullYear();
  if(y===2026 && m===7 && dt>=15 && dt<=19) state.day = dt;
})();

const $ = s => document.querySelector(s);

function buildDays(){
  const today = new Date();
  const isFestNow = today.getFullYear()===2026 && (today.getMonth()+1)===7;
  $("#days").innerHTML = DAYS.map(d=>{
    const t = isFestNow && today.getDate()===d.d ? " today":"";
    return `<button class="day${d.d===state.day?' active':''}${t}" data-day="${d.d}">
      <b>${d.d}</b><span>${d.dow}</span></button>`;
  }).join("");
  $("#days").querySelectorAll(".day").forEach(b=>b.onclick=()=>{state.day=+b.dataset.day; render();});
}

function buildChips(){
  const cats = ["all", ...Object.keys(CATS)];
  $("#chips").innerHTML = cats.map(c=>{
    if(c==="all") return `<button class="chip${state.cat==='all'?' active':''}" data-cat="all">Tudo</button>`;
    return `<button class="chip${state.cat===c?' active':''}" data-cat="${c}">
      <span class="dot" style="background:${catColor(c)}"></span>${c}</button>`;
  }).join("");
  $("#chips").querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
    state.cat = b.dataset.cat; render();
  });
}

function nowInfo(){
  const n = new Date();
  return {fest: n.getFullYear()===2026 && (n.getMonth()+1)===7 && n.getDate()>=15 && n.getDate()<=19,
          day:n.getDate(), mins:n.getHours()*60+n.getMinutes()};
}
const toMin = hhmm => {const[a,b]=hhmm.split(":").map(Number); return a*60+b;};

function mapsLink(v){
  const q = encodeURIComponent(v.split("→").pop().split(":").pop().trim()+", Aveiro, Portugal");
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}

function render(){
  buildDays(); buildChips();
  const day = DAYS.find(d=>d.d===state.day);
  $("#daytitle").innerHTML = day.label;
  const q = state.q.trim().toLowerCase();
  const ni = nowInfo();

  let items = EV.filter(e=>e.day===state.day)
    .filter(e=>state.cat==="all"||e.cat===state.cat)
    .filter(e=>!state.favOnly||favs.has(evId(e)))
    .filter(e=>!q||(`${e.t} ${e.g} ${e.v} ${e.cat}`.toLowerCase().includes(q)))
    .sort((a,b)=>toMin(a.h)-toMin(b.h));

  $("#daytitle").innerHTML += ` <span class="count">${items.length} ${items.length===1?'evento':'eventos'}</span>`;

  if(!items.length){
    $("#list").innerHTML = `<div class="empty"><b>Nada por aqui</b>
      ${state.favOnly?'Ainda não marcaste favoritos para este dia.':'Experimenta outro filtro ou outra pesquisa.'}</div>`;
    return;
  }

  $("#list").innerHTML = `<div class="timeline">` + items.map((e,i)=>{
    const id = evId(e), isFav = favs.has(id);
    let now=false;
    if(ni.fest && ni.day===e.day && e.e){
      const s=toMin(e.h), en=toMin(e.e)<=s?toMin(e.e)+1440:toMin(e.e);
      now = ni.mins>=s && ni.mins<=en;
    }
    const col = catColor(e.cat);
    const hasDesc = !!DESC[e.t];
    return `<div class="ev${now?' is-now':''}" style="animation-delay:${Math.min(i*30,300)}ms">
      <div class="time">${e.h}${e.e?`<small>${e.e}</small>`:''}</div>
      <div class="node" style="border-color:${now?'var(--coral)':col}"></div>
      <div class="card tappable${hasDesc?' has-desc':''}" style="border-left-color:${col}" data-open="${id.replace(/"/g,'&quot;')}">
        <div class="top">
          <div>
            <p class="title">${e.t}${e.c?`<span class="flag">${e.c}</span>`:''}${e.hl?`<span class="flag" style="background:var(--amber);color:var(--teal-900)">PALCO PRINCIPAL</span>`:''}</p>
            ${e.g?`<p class="group">${e.g}</p>`:''}
          </div>
          <button class="star${isFav?' on':''}" data-id="${id.replace(/"/g,'&quot;')}" aria-label="Favorito">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17.3 5.8 21l1.6-7L2 9.2l7.1-.6L12 2l2.9 6.6 7.1.6-5.4 4.8 1.6 7z"/></svg>
          </button>
        </div>
        <div class="meta">
          <span class="cat" style="color:${col}">${e.cat}</span>
          <a class="venue" href="${mapsLink(e.v)}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            ${e.v}</a>
          ${now?'<span class="badge-now">A DECORRER</span>':''}
        </div>
      </div>
    </div>`;
  }).join("") + `</div>`;

  $("#list").querySelectorAll(".star").forEach(b=>b.onclick=(ev)=>{
    ev.stopPropagation();
    const id=b.dataset.id;
    if(favs.has(id)) favs.delete(id); else favs.add(id);
    localStorage.setItem(LS_FAV, JSON.stringify([...favs]));
    render();
  });
  $("#list").querySelectorAll(".venue").forEach(a=>a.addEventListener("click",ev=>ev.stopPropagation()));
  $("#list").querySelectorAll(".card[data-open]").forEach(c=>c.onclick=()=>openDetail(c.dataset.open));
}

function dayLabel(d){const x=DAYS.find(z=>z.d===d);return x?x.label:"";}

function openDetail(id){
  const e = EV.find(x=>evId(x)===id);
  if(!e) return;
  const col = catColor(e.cat);
  const isFav = favs.has(id);
  const when = `${dayLabel(e.day)} · ${e.h}${e.e?`–${e.e}`:""}`;
  const desc = DESC[e.t];
  $("#sheetBody").innerHTML = `
    <p class="s-cat" style="color:${col}">${e.cat}${e.hl?' · Palco principal':''}</p>
    <h2 id="sheetTitle">${e.t}${e.c?` <span class="flag" style="vertical-align:3px">${e.c}</span>`:''}</h2>
    ${e.g?`<p class="s-group">${e.g}</p>`:''}
    <div class="s-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span>${when}</span></div>
    <div class="s-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg><a href="${mapsLink(e.v)}" target="_blank" rel="noopener">${e.v}</a></div>
    ${desc?`<p class="s-desc">${desc}</p>`:`<p class="s-desc" style="color:#8a948f">Sem descrição disponível para este evento.</p>`}
    <div class="s-actions">
      <button class="s-btn fav${isFav?' on':''}" id="sheetFav">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M12 17.3 5.8 21l1.6-7L2 9.2l7.1-.6L12 2l2.9 6.6 7.1.6-5.4 4.8 1.6 7z"/></svg>
        ${isFav?'Nos favoritos':'Adicionar aos favoritos'}
      </button>
      <a class="s-btn primary" href="${mapsLink(e.v)}" target="_blank" rel="noopener">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        Abrir mapa
      </a>
    </div>`;
  $("#backdrop").hidden = false;
  $("#sheet").hidden = false;
  document.body.style.overflow = "hidden";
  $("#sheetFav").onclick = ()=>{
    if(favs.has(id)) favs.delete(id); else favs.add(id);
    localStorage.setItem(LS_FAV, JSON.stringify([...favs]));
    openDetail(id); render();
  };
}
function closeDetail(){
  $("#sheet").hidden = true;
  $("#backdrop").hidden = true;
  document.body.style.overflow = "";
}
$("#backdrop").onclick = closeDetail;
$("#sheetClose").onclick = closeDetail;
document.addEventListener("keydown", e=>{ if(e.key==="Escape" && !$("#sheet").hidden) closeDetail(); });

$("#search").oninput = e=>{state.q=e.target.value; render();};
$("#favbtn").onclick = ()=>{
  state.favOnly=!state.favOnly;
  $("#favbtn").classList.toggle("on",state.favOnly);
  $("#favbtn").setAttribute("aria-pressed",state.favOnly);
  render();
};

render();
// refresca o estado "a decorrer" a cada minuto
setInterval(render, 60000);
</script>
